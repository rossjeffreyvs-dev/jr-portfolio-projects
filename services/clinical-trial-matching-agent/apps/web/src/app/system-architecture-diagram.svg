  <text x="64" y="124" fill="#617091" font-family="Inter, Arial, sans-serif" font-size="20">Frontend, workflow services, and mock data layer used in the clinical trial matching demo.</text>

  <rect x="64" y="172" width="320" height="500" rx="24" fill="#F6F8FE" stroke="#CDD8F6" stroke-width="2"/>
