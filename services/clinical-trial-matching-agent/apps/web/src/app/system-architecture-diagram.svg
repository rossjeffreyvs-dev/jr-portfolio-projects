      <text x="864" y="466" fill="#617091" font-size="16" font-weight="600">Handle review actions and case outcomes</text>
    </g>
    <g>
      <rect x="518" y="510" width="280" height="94" rx="18" fill="white" stroke="#E0D5F3" stroke-width="2"/>
