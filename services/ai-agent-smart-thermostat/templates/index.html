<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Smart Thermostat</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; background: #f7f7f8; padding: 40px; }
    .card { max-width: 600px; margin: auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    button { padding: 10px 16px; border-radius: 8px; border: none; background: #2563eb; color: white; cursor: pointer; }
    input { padding: 8px; width: 100px; }
    pre { background: #111827; color: #e5e7eb; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Smart Thermostat Demo</h1>
    <p>Enter a temperature and activate the rule-based thermostat.</p>
    <input id="temp" type="number" value="22" step="0.1"/>
    <button onclick="activate()">Activate Smart Thermostat</button>
    <pre id="output">Not activated</pre>
  </div>

<script>
async function activate() {
  await fetch('/api/activate', { method: 'POST' });
  step();
}

async function step() {
  const t = document.getElementById('temp').value;
  const res = await fetch('/api/step', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ temperature: t })
  });
  const data = await res.json();
  document.getElementById('output').textContent = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
